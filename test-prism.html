<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Prism Web Scan – Debug</title>
  <style>
    body { margin:0; padding:20px; background:#111; color:#fff; font-family:sans-serif; }
    button.prism-button { padding:20px 40px; font-size:18px; background:#10b981; border:none; border-radius:12px; color:white; cursor:pointer; }
  </style>
</head>
<body>

  <h1>Prism SDK Test (Minimal)</h1>
  <button class="prism-button">Start scan</button>

  <script>
    console.log("🔍 [Debug] Page loaded - attaching event listener FIRST");

    // Attach listener BEFORE loading the script
    window.addEventListener("onPrismLoaded", function (event) {
      console.log("🔍 [Debug] onPrismLoaded event FIRED!", event.detail);
      const prism = event.detail.prism;
      if (prism) {
        console.log("🔍 [Debug] Prism object received, calling render({})");
        prism.render({});
        console.log("🔍 [Debug] prism.render({}) called with minimal config");
      } else {
        console.error("🔍 [Debug] No prism object in event");
      }
    });

    // Load Prism SDK
    (function () {
      const script = document.createElement("script");
      script.src = "https://cdn.prismlabs.tech/prism.js";
      script.async = true;

      script.onload = () => {
        console.log("✅ [Debug] Prism SDK script loaded successfully");
      };

      script.onerror = () => {
        console.error("❌ [Debug] Failed to load Prism SDK script");
      };

      document.body.appendChild(script);
    })();
  </script>

</body>
</html>
